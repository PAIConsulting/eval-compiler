# keywords.yaml
#
# Project:    Evaluation Compiler (InfoShare evaluation reporting tool)
# Owner:      PAI Consulting
# Purpose:    Hand-maintained keyword dictionary for categorizing free-text
#             comments. Entirely human-authored; no AI or machine-learning
#             involved in producing categorizations at runtime.
# Version:    0.1.0 (demonstration with fictional categories)
#
# This file is loaded with yaml.safe_load() at runtime — see compile_report.py.
#
# ============================================================================
# HOW IT WORKS
# ============================================================================
#
#   - Each entry has a Keyword 1 (broad category) and Keyword 2 (subcategory)
#   - When the tool sees a free-text comment, it counts how many of each
#     entry's "trigger" words appear in the comment
#   - The entry with the most matches wins; ties go to the earliest-defined
#   - If no triggers match, the comment is tagged "Uncategorized" for manual
#     review
#
# ============================================================================
# IMPORTANT
# ============================================================================
#
# This example file uses fictional/generic categories for demonstration.
# The production version is built and maintained by the user based on
# domain expertise. No AI is involved in creating or updating this file.

categories:
  - keyword_1: "Personnel"
    keyword_2: "Fatigue"
    triggers: [fatigue, fatigued, tired, exhausted, exhaustion, sleep, rest, "night shift"]

  - keyword_1: "Personnel"
    keyword_2: "Workload"
    triggers: [workload, overworked, "too much work", pressure, burnout, "peak periods", unsustainable]

